<p-toast key="notification" position="top-right" styleClass="default"></p-toast>

<div class="auth-page">
  <header class="auth-page__header">
    <h1>Meu Closet</h1>
    <p class="auth-page__subtitle">
      Combine peças de roupas, monte e organize seus looks!
    </p>
  </header>

  <div class="auth-page__layout">
    <div class="auth-page__illustration">
      <img src="assets/undraw_web_shopping_re_owap.svg" alt="" />
    </div>

    <p-card styleClass="auth-card">
      <div class="auth-card__body">
        <h2>Login</h2>

        <form [formGroup]="form" (ngSubmit)="login()">
          <div class="field">
            <label for="email">E-mail</label>
            <input
              id="email"
              type="email"
              pInputText
              formControlName="email"
              placeholder="Digite seu e-mail"
            />
            <small
              class="p-error"
              *ngIf="
                formControl['email'].touched &&
                formControl['email'].errors?.['required']
              "
            >
              E-mail é obrigatório!
            </small>
            <small
              class="p-error"
              *ngIf="
                formControl['email'].touched &&
                formControl['email'].errors?.['email']
              "
            >
              Digite um e-mail válido!
            </small>
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <p-password
              inputId="password"
              formControlName="password"
              placeholder="Digite a sua senha"
              [feedback]="false"
              [toggleMask]="true"
              styleClass="w-full"
            ></p-password>
            <small
              class="p-error"
              *ngIf="
                formControl['password'].touched &&
                formControl['password'].errors?.['required']
              "
            >
              Senha é obrigatória!
            </small>
          </div>

          <p-button
            type="submit"
            label="Entrar"
            [disabled]="form.invalid || isSubmitting"
            [loading]="isSubmitting"
            styleClass="auth-card__submit"
          ></p-button>
        </form>

        <button type="button" class="auth-card__link" (click)="openDialogRecover()">
          Esqueceu sua senha?
        </button>
      </div>

      <ng-template pTemplate="footer">
        <div class="auth-card__footer">
          <span>Ainda não tem uma conta?</span>
          <a routerLink="/signup">Cadastre-se</a>
        </div>
      </ng-template>
    </p-card>
  </div>
</div>

<app-footer></app-footer>
