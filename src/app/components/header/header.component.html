<header class="app-header">
  <div class="app-header__inner closet-shell">
    <a routerLink="/" class="app-header__brand" aria-label="Meu Closet — início">
      Meu Closet
    </a>

    <nav class="app-header__nav" aria-label="Navegação principal">
      <app-menu></app-menu>
    </nav>

    <div class="app-header__actions">
      <div class="app-header__year">
        <p-datepicker
          (ngModelChange)="setYear($event)"
          styleClass="year_select"
          [(ngModel)]="this.filterFacade.year"
          [readonlyInput]="true"
          view="year"
          dateFormat="yy"
          [showIcon]="true"
          inputId="icondisplay"
          [attr.aria-label]="'Filtrar por ano'"
        />
      </div>

      <button
        type="button"
        id="username"
        class="closet-header__user app-header__profile"
        (click)="menu.toggle($event)"
      >
        <app-user-img [email]="user?.email ?? ''"></app-user-img>
        <span class="closet-header__greeting">{{ displayName }}</span>
      </button>
      <p-menu #menu [model]="items" [popup]="true"></p-menu>
    </div>
  </div>
</header>
